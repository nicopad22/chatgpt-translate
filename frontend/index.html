<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TranslatePro — Traductor de Documentos</title>
  <meta name="description" content="Traduce tus documentos .docx, .xlsx y .pptx automáticamente con TranslatePro.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="screen landing-screen">
    <div class="container">
      <div class="landing-hero">
        <div class="landing-logo">📄</div>
        <h1>TranslatePro</h1>
        <p class="landing-tagline">Traduce tus documentos automáticamente</p>

        <div class="landing-formats">
          <span class="landing-format-badge">.docx</span>
          <span class="landing-format-badge">.xlsx</span>
          <span class="landing-format-badge">.pptx</span>
        </div>

        <p class="landing-description">
          Sube tus documentos de Office y obtén traducciones precisas en segundos.
          Mantiene el formato original intacto.
        </p>

        <div class="landing-cta">
          <a href="/login" class="btn-primary">Iniciar Sesión</a>
          <a href="/signup" class="btn-secondary">Crear Cuenta</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script>
    // If user is already logged in, redirect to /app
    window.supabaseClient.auth.getSession().then(function (result) {
      if (result.data.session) {
        window.location.href = '/app';
      }
    });
  </script>
</body>
</html>
